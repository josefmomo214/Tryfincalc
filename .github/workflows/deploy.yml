name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      # The standalone output requires merging folders for deployment:
      # 1. Copy public into .next/standalone/public
      # 2. Copy .next/static into .next/standalone/.next/static
      - name: Prepare Deployment Files
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/static

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: .next/standalone/
          server-dir: ./public_html/
          # No clean slate for now to avoid errors
